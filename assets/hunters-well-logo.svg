    <rect x="94" y="36" width="3.2" height="60" transform="rotate(-15 95.6 66)" opacity="0.96"/>

    <text x="60" y="75" font-family="Inter, Arial, Helvetica, sans-serif" font-size="32" font-weight="800" letter-spacing="-4">HW</text>
    <text x="190" y="75" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="17">HUNTERS WELL</text>
