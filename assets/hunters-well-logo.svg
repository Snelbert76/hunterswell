<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 120" role="img" aria-labelledby="title desc">
  <title id="title">Hunters Well logo</title>
  <desc id="desc">Hunters Well approved brass monogram and wordmark.</desc>
  <defs>
    <linearGradient id="hwBrass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4dfaa"/>
      <stop offset="0.46" stop-color="#b9985a"/>
      <stop offset="1" stop-color="#7f6336"/>
